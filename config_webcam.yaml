# Local webcam configuration (RGB mode) for top-mounted camera simulation.
# Use this when testing on your computer webcam.
#
# Assumption:
# - Camera is physically above/near the machine, pointing outward at people.
# - Machine is roughly on the RIGHT side of frame.
#
# Tune the polygons after first run to match your physical setup.

source: 0
output_dir: runs

detector:
  weights: yolov8n.pt
  confidence: 0.58
  iou: 0.5
  imgsz: 320
  device: null
  enable_upper_body_assist: false
  upper_body_merge_iou: 0.45
  shape_filter:
    min_aspect_ratio: 0.78
    max_aspect_ratio: 4.2
    min_area_frac: 0.004
    max_area_frac: 0.45
  human_filter:
    enabled: false
    min_confidence: 0.60
    high_confidence_fallback: 0.84
  motion_filter:
    enabled: true
    pixel_delta_threshold: 18
    min_motion_pixels: 40
    min_motion_ratio: 0.012

tracker:
  max_disappeared: 30
  max_distance: 120
  appearance_weight: 0.30

funnel:
  engagement_dwell_sec: 1.8
  transaction_dwell_sec: 4.5
  visitor_min_confidence: 0.62
  visitor_min_motion_px: 18.0
  visitor_min_seen_frames: 8
  visitor_min_foot_traffic_frames: 5
  visitor_min_displacement_px: 34.0
  visitor_min_path_px: 56.0

output:
  write_annotated_video: false
  write_event_log: true
  write_summary: true
  show_window: false

privacy:
  mode: "off"

gaze:
  enabled: true
  head_region_frac: 0.35
  min_face_size_frac: 0.06
  scale_factor: 1.08
  min_neighbors: 1
  min_turn_offset_frac: 0.035
  use_mediapipe_headpose: true
  strict_yaw_deg: 16.0
  attention_yaw_deg: 32.0

approach:
  min_move_px: 7.0
  min_cosine: 0.45

runtime:
  infer_every_n_frames: 1
  upper_body_every_n_frames: 3
  gaze_every_n_frames: 3

# RGB mode needs polygon zones (not min_m/max_m distance bands).
# Coordinates are normalized (0..1) so they scale with webcam resolution.
zones:
  - name: foot_traffic
    color: [255, 200, 0]
    polygon:
      - [0.00, 0.28]
      - [1.00, 0.28]
      - [1.00, 1.00]
      - [0.00, 1.00]

  - name: engagement
    color: [0, 200, 255]
    polygon:
      - [0.62, 0.36]
      - [0.98, 0.36]
      - [0.98, 1.00]
      - [0.56, 1.00]

  - name: transaction
    color: [0, 255, 0]
    polygon:
      - [0.74, 0.42]
      - [0.95, 0.42]
      - [0.95, 1.00]
      - [0.70, 1.00]
